<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard KPI — SPP UiTM</title>
  <script src="auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" onload="initGIS()" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #6d1f6e;
      --brand-2: #9b2d8f;
      --brand-deep: #4a1350;
      --accent: #f0a500;
      --ink: #1c1526;
      --muted: #6b6478;
      --line: #ece7f0;
      --ok: #1a8a52;
      --ok-bg: #e7f7ee;
      --err: #c0392b;
      --err-bg: #fdecec;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      padding: 1.75rem 1.5rem 3rem;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(1000px 500px at 100% -5%, rgba(155,45,143,0.10), transparent 55%),
        radial-gradient(800px 400px at -5% 0%, rgba(240,165,0,0.08), transparent 50%),
        #f4f1f7;
    }

    .wrap { max-width: 1120px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
      gap: 0.9rem;
    }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand-badge {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--brand-deep), var(--brand-2));
      color: #fff; font-weight: 800; font-size: 0.82rem;
      display: grid; place-items: center; letter-spacing: 0.5px;
      box-shadow: 0 8px 18px -8px rgba(109,31,110,0.6);
    }
    h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; }
    .brand-sub { font-size: 0.75rem; color: var(--muted); font-weight: 500; margin-top: 1px; }

    .header-actions { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    .nav-link {
      font-size: 0.85rem; color: var(--brand); text-decoration: none; font-weight: 700;
      padding: 0.55rem 1rem; border-radius: 10px; border: 1.5px solid var(--line); background: #fff;
      transition: border-color 0.15s, transform 0.15s;
    }
    .nav-link:hover { border-color: var(--brand-2); transform: translateY(-1px); }

    .btn {
      padding: 0.6rem 1.15rem;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s, border-color 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      background: linear-gradient(135deg, var(--brand-2), var(--brand)); color: #fff;
      box-shadow: 0 10px 22px -12px rgba(109,31,110,0.7);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.06); }
    .btn-outline { background: #fff; border: 1.5px solid var(--line); color: var(--brand); }
    .btn-outline:hover:not(:disabled) { border-color: var(--brand-2); background: #faf6fb; }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1.1rem;
      margin-bottom: 1.35rem;
    }
    .kpi-card {
      position: relative;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.3rem 1.5rem;
      box-shadow: 0 12px 30px -20px rgba(30,5,40,0.3);
      overflow: hidden;
    }
    .kpi-card::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: linear-gradient(180deg, var(--brand-2), var(--accent));
    }
    .kpi-label {
      font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 0.5rem;
    }
    .kpi-value {
      font-size: 2.1rem; font-weight: 800; line-height: 1; letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--brand-2), var(--brand));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .kpi-sub { font-size: 0.76rem; color: var(--muted); margin-top: 0.45rem; font-weight: 500; }

    /* Charts row */
    .charts-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.35rem; margin-bottom: 1.35rem;
    }
    @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 30px -20px rgba(30,5,40,0.28);
      padding: 1.5rem 1.6rem;
    }
    .card-title {
      font-size: 0.95rem; font-weight: 800; margin-bottom: 1.2rem;
      padding-bottom: 0.75rem; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 0.55rem; letter-spacing: -0.01em;
    }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex: none; }

    /* Program table */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left; padding: 0.6rem 0.8rem;
      background: #faf6fb; color: var(--brand);
      font-weight: 700; font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--line);
    }
    th:first-child { border-top-left-radius: 10px; }
    th:last-child { border-top-right-radius: 10px; }
    td { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--line); color: var(--ink); vertical-align: middle; font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #faf5fb; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; }
    .badge-open   { background: var(--ok-bg); color: var(--ok); }
    .badge-closed { background: #efeaf2; color: var(--muted); }

    .spinner {
      width: 32px; height: 32px; margin: 3rem auto;
      border: 3px solid var(--line); border-top-color: var(--brand-2);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert-error { background: var(--err-bg); color: var(--err); padding: 0.85rem 1rem; border-radius: 12px; font-size: 0.88rem; font-weight: 500; }

    #auth-wall {
      position: fixed; inset: 0; z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 1.25rem;
      background: rgba(28,10,34,0.55); backdrop-filter: blur(6px);
    }
    .auth-box {
      background: #fff; border-radius: 20px; padding: 2.2rem 2rem; text-align: center;
      box-shadow: 0 30px 70px -25px rgba(30,5,40,0.6); max-width: 340px; width: 100%;
    }
    .auth-mark {
      width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 1.1rem;
      background: linear-gradient(135deg, var(--brand-deep), var(--brand-2));
      display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 1.1rem;
    }
    .auth-box h2 { font-size: 1.15rem; font-weight: 800; margin-bottom: 0.45rem; }
    .auth-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.35rem; line-height: 1.55; }
    #gsi-btn { display: flex; justify-content: center; }

    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.2rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--line);
    }
    .section-title { font-size: 0.95rem; font-weight: 800; display: flex; align-items: center; gap: 0.55rem; }
    .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex: none; }

    .filter-bar {
      display: flex; align-items: center; gap: 0.75rem;
      background: #fff; border: 1px solid var(--line); border-radius: 14px;
      padding: 0.85rem 1.1rem; margin-bottom: 1.35rem;
      box-shadow: 0 12px 30px -22px rgba(30,5,40,0.25);
    }
    .filter-bar label { font-size: 0.8rem; font-weight: 700; color: var(--ink); }
    .filter-bar select {
      font-family: inherit; font-size: 0.88rem; font-weight: 600; color: var(--ink);
      padding: 0.5rem 0.8rem; border: 1.5px solid var(--line); border-radius: 10px;
      background: #fff; cursor: pointer; transition: border-color 0.15s;
    }
    .filter-bar select:focus { outline: none; border-color: var(--brand-2); }
  </style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">
    <span class="brand-badge">UiTM</span>
    <div>
      <h1>Dashboard KPI</h1>
      <div class="brand-sub">Penglibatan Pelajar · Hal Ehwal Pelajar</div>
    </div>
  </div>
  <div class="header-actions">
    <a class="nav-link" href="admin.html">← Admin Panel</a>
    <button class="btn btn-outline" onclick="loadKPI(this)">Muat Semula</button>
    <button class="btn btn-primary" id="btn-export" onclick="exportCSV(this)" disabled>Export CSV</button>
  </div>
</header>

<div id="main-content">
  <div class="spinner"></div>
</div>
</div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbxfVUFnpLxR51o_Xfg0DTiyvrHi5AmDMwwWSeEbAh0ztZgsuarguQ5-bwz5Oki1027vAw/exec';

  let kpiData = null;
  const charts = {};  // canvasId -> Chart instance

  async function loadKPI(btn) {
    document.getElementById('main-content').innerHTML = '<div class="spinner"></div>';
    document.getElementById('btn-export').disabled = true;
    if (btn) setBtnLoading(btn, true, 'Memuat…');

    try {
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'getKPI', idToken: getAuthToken() }),
        redirect: 'follow',
      });
      const json = await res.json();

      if (!json.ok) {
        document.getElementById('main-content').innerHTML =
          '<div class="alert-error">' + escapeText(json.error) + '</div>';
        return;
      }

      kpiData = json.data;
      render(kpiData);
      document.getElementById('btn-export').disabled = false;

    } catch (err) {
      document.getElementById('main-content').innerHTML =
        '<div class="alert-error">Ralat sambungan. Sila cuba semula.</div>';
    } finally {
      if (btn) setBtnLoading(btn, false);
    }
  }

  let activeYear = 'all';

  function currentStats() {
    if (activeYear === 'all') return kpiData.all;
    return kpiData.byYear[activeYear] || kpiData.all;
  }

  function render(d) {
    const yearOptions = ['<option value="all">Semua Tahun</option>']
      .concat((d.years || []).map(y => `<option value="${y}">${y}</option>`))
      .join('');

    const html = `
      <div class="filter-bar">
        <label for="year-filter" style="margin:0">Tapis mengikut tahun</label>
        <select id="year-filter" onchange="onYearChange(this.value)">${yearOptions}</select>
      </div>

      <div class="kpi-grid" id="kpi-grid"></div>

      <div class="card" style="margin-bottom:1.35rem">
        <div class="card-title"><span class="dot"></span>Trend Penglibatan Mengikut Bulan</div>
        <canvas id="chart-month" height="210"></canvas>
      </div>

      <div class="charts-grid">
        <div class="card">
          <div class="card-title"><span class="dot"></span>Penglibatan Mengikut Tahun</div>
          <canvas id="chart-year" height="240"></canvas>
        </div>
        <div class="card">
          <div class="card-title"><span class="dot"></span>Penglibatan Mengikut Fakulti</div>
          <canvas id="chart-faculty" height="240"></canvas>
        </div>
      </div>

      <div class="charts-grid">
        <div class="card">
          <div class="card-title"><span class="dot"></span>Penglibatan Mengikut Semester</div>
          <canvas id="chart-semester" height="240"></canvas>
        </div>
        <div class="card">
          <div class="section-header">
            <span class="section-title"><span class="dot"></span>Senarai Program</span>
            <span id="prog-count" style="font-size:0.8rem;color:var(--muted);font-weight:600"></span>
          </div>
          <div id="programs-table"></div>
        </div>
      </div>
    `;

    document.getElementById('main-content').innerHTML = html;
    document.getElementById('year-filter').value = activeYear;

    // Year chart is always across all years (context)
    renderChart('chart-year', d.yearBreakdown, 'Penyertaan', 'bar');
    renderActiveStats();
  }

  // Re-renders everything that depends on the selected year
  function renderActiveStats() {
    const s = currentStats();
    renderKPICards(s);
    renderChart('chart-month', s.monthBreakdown, 'Penyertaan', 'line');
    renderChart('chart-faculty', s.facultyBreakdown, 'Pelajar', 'bar');
    renderChart('chart-semester', s.semesterBreakdown, 'Pelajar', 'bar');
    renderProgramsTable(s.programs);
    document.getElementById('prog-count').textContent = s.programs.length + ' program';
  }

  function onYearChange(value) {
    activeYear = value;
    renderActiveStats();
  }

  function renderKPICards(d) {
    const grid = document.getElementById('kpi-grid');

    const cards = [
      {
        label: 'KPI 1 — Capaian Unik',
        value: d.kpi1.value + '%',
        sub: d.kpi1.uniqueStudents + ' pelajar unik / ' + d.kpi1.totalPopulation.toLocaleString() + ' populasi',
      },
      {
        label: 'KPI 2 — Kedalaman Penglibatan',
        value: d.kpi2.value + '%',
        sub: d.kpi2.multiParticipants + ' pelajar terlibat ≥2 program',
      },
      {
        label: 'Jumlah Program',
        value: d.programs.length,
        sub: d.programs.filter(p => p.status === 'open').length + ' program aktif',
      },
      {
        label: 'Jumlah Pendaftaran',
        value: d.programs.reduce((s, p) => s + p.participantCount, 0).toLocaleString(),
        sub: 'rekod kehadiran keseluruhan',
      },
    ];

    cards.forEach(c => {
      const card = document.createElement('div');
      card.className = 'kpi-card';

      const label = document.createElement('div');
      label.className = 'kpi-label';
      label.textContent = c.label;

      const value = document.createElement('div');
      value.className = 'kpi-value';
      value.textContent = c.value;

      const sub = document.createElement('div');
      sub.className = 'kpi-sub';
      sub.textContent = c.sub;

      card.appendChild(label);
      card.appendChild(value);
      card.appendChild(sub);
      grid.appendChild(card);
    });
  }

  function renderChart(canvasId, breakdown, dataLabel, type) {
    if (charts[canvasId]) charts[canvasId].destroy();

    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const labels = breakdown.map(r => r.label);
    const data   = breakdown.map(r => r.count);

    const ctxGrad = canvas.getContext('2d');
    const grad = ctxGrad.createLinearGradient(0, 0, 0, 240);
    grad.addColorStop(0, 'rgba(155,45,143,0.95)');
    grad.addColorStop(1, 'rgba(240,165,0,0.85)');

    const isLine = type === 'line';
    const dataset = isLine
      ? {
          label: dataLabel,
          data,
          borderColor: '#9b2d8f',
          backgroundColor: 'rgba(155,45,143,0.12)',
          borderWidth: 2.5,
          fill: true,
          tension: 0.35,
          pointBackgroundColor: '#9b2d8f',
          pointRadius: 3,
          pointHoverRadius: 5,
        }
      : {
          label: dataLabel,
          data,
          backgroundColor: grad,
          borderWidth: 0,
          borderRadius: 7,
          maxBarThickness: 46,
        };

    charts[canvasId] = new Chart(canvas, {
      type: isLine ? 'line' : 'bar',
      data: { labels, datasets: [dataset] },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#2c1030',
            padding: 10,
            cornerRadius: 8,
            titleFont: { family: 'Plus Jakarta Sans', weight: '700' },
            bodyFont: { family: 'Plus Jakarta Sans' },
            callbacks: {
              label: ctx => {
                const row = breakdown[ctx.dataIndex];
                const suffix = (row.pct !== undefined) ? ' (' + row.pct + '%)' : '';
                return ctx.parsed.y + ' ' + dataLabel.toLowerCase() + suffix;
              },
            },
          },
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 10 }, color: '#6b6478', maxRotation: 40 } },
          y: { beginAtZero: true, ticks: { precision: 0, font: { family: 'Plus Jakarta Sans' }, color: '#6b6478' }, grid: { color: '#f0ecf3' } },
        },
      },
    });
  }

  function renderProgramsTable(programs) {
    const container = document.getElementById('programs-table');

    if (!programs.length) {
      container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:1.5rem 0">Tiada program lagi.</p>';
      return;
    }

    const sorted = [...programs].sort((a, b) => {
      if (a.status === b.status) return new Date(b.date) - new Date(a.date);
      return a.status === 'open' ? -1 : 1;
    });

    const table = document.createElement('table');

    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    ['Nama Program', 'Tarikh', 'Anjuran', 'Pelajar', 'Status'].forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    sorted.forEach(prog => {
      const tr = document.createElement('tr');

      const cells = [
        prog.name,
        prog.date,
        prog.organizer,
        prog.participantCount,
      ];

      cells.forEach(val => {
        const td = document.createElement('td');
        td.textContent = val; // textContent — XSS safe
        tr.appendChild(td);
      });

      const statusTd = document.createElement('td');
      const badge = document.createElement('span');
      badge.className = 'badge badge-' + prog.status;
      badge.textContent = prog.status === 'open' ? 'Buka' : 'Tutup';
      statusTd.appendChild(badge);
      tr.appendChild(statusTd);

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    container.appendChild(table);
  }

  // ── CSV Export ──────────────────────────────────────────────────────────────

  function exportCSV(btn) {
    if (!kpiData) return;

    if (btn) {
      setBtnLoading(btn, true, 'Menyedia…');
      // Restore shortly after the browser triggers the download
      setTimeout(() => setBtnLoading(btn, false), 800);
    }

    const s = currentStats();
    const scope = activeYear === 'all' ? 'Semua Tahun' : ('Tahun ' + activeYear);

    const rows = [
      ['Skop Laporan', scope],
      [],
      ['=== KPI SUMMARY ==='],
      ['KPI 1 - Capaian Unik (%)', s.kpi1.value],
      ['Pelajar Unik', s.kpi1.uniqueStudents],
      ['Jumlah Populasi', s.kpi1.totalPopulation],
      ['KPI 2 - Kedalaman Penglibatan (%)', s.kpi2.value],
      ['Pelajar ≥2 Program', s.kpi2.multiParticipants],
      ['Jumlah Penyertaan', s.totalParticipations],
      [],
      ['=== BREAKDOWN TAHUN (keseluruhan) ==='],
      ['Tahun', 'Penyertaan', '%'],
      ...kpiData.yearBreakdown.map(r => [r.label, r.count, r.pct]),
      [],
      ['=== BREAKDOWN BULAN ==='],
      ['Bulan', 'Penyertaan'],
      ...s.monthBreakdown.map(r => [r.label, r.count]),
      [],
      ['=== BREAKDOWN FAKULTI ==='],
      ['Fakulti', 'Pelajar', '%'],
      ...s.facultyBreakdown.map(r => [r.label, r.count, r.pct]),
      [],
      ['=== BREAKDOWN SEMESTER ==='],
      ['Semester', 'Pelajar', '%'],
      ...s.semesterBreakdown.map(r => [r.label, r.count, r.pct]),
      [],
      ['=== PROGRAM ==='],
      ['Nama', 'Tarikh', 'Anjuran', 'Pelajar', 'Status'],
      ...s.programs.map(p => [p.name, p.date, p.organizer, p.participantCount, p.status]),
    ];

    const csv = rows.map(row =>
      row.map(cell => {
        const s = String(cell === undefined ? '' : cell);
        // Escape for CSV — wrap in quotes if contains comma, quote, or newline
        return /[,"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      }).join(',')
    ).join('\r\n');

    // BOM for Excel UTF-8 compatibility
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const today = new Date().toISOString().slice(0, 10);
    const yearTag = activeYear === 'all' ? 'SemuaTahun' : activeYear;
    a.download = 'KPI_HEP_' + yearTag + '_' + today + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  function escapeText(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  requireAuth(loadKPI);
</script>

<div id="auth-wall">
  <div class="auth-box">
    <div style="background:#7b2d8b;color:#fff;font-weight:700;font-size:0.8rem;padding:4px 12px;border-radius:6px;display:inline-block;margin-bottom:1rem;letter-spacing:1px">UiTM HEP</div>
    <h2>Log Masuk Diperlukan</h2>
    <p>Gunakan akaun Google UiTM anda untuk melihat Dashboard KPI.</p>
    <div id="gsi-btn"></div>
  </div>
</div>
</body>
</html>
