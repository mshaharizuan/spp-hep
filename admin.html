<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — SPP UiTM</title>
  <script src="auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" onload="initGIS()" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #6d1f6e;
      --brand-2: #9b2d8f;
      --brand-deep: #4a1350;
      --accent: #f0a500;
      --ink: #1c1526;
      --muted: #6b6478;
      --line: #ece7f0;
      --ok: #1a8a52;
      --ok-bg: #e7f7ee;
      --err: #c0392b;
      --err-bg: #fdecec;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      padding: 1.75rem 1.5rem 3rem;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(1000px 500px at 100% -5%, rgba(155,45,143,0.10), transparent 55%),
        radial-gradient(800px 400px at -5% 0%, rgba(240,165,0,0.08), transparent 50%),
        #f4f1f7;
    }

    .wrap { max-width: 1040px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand-badge {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--brand-deep), var(--brand-2));
      color: #fff; font-weight: 800; font-size: 0.82rem;
      display: grid; place-items: center; letter-spacing: 0.5px;
      box-shadow: 0 8px 18px -8px rgba(109,31,110,0.6);
    }
    h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; }
    .brand-sub { font-size: 0.75rem; color: var(--muted); font-weight: 500; margin-top: 1px; }
    .nav-link {
      font-size: 0.85rem; color: var(--brand); text-decoration: none; font-weight: 700;
      padding: 0.55rem 1rem; border-radius: 10px; border: 1.5px solid var(--line); background: #fff;
      transition: border-color 0.15s, transform 0.15s;
    }
    .nav-link:hover { border-color: var(--brand-2); transform: translateY(-1px); }

    .grid { display: grid; grid-template-columns: 1fr 1.15fr; gap: 1.35rem; align-items: start; }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 30px -18px rgba(30,5,40,0.25);
      padding: 1.5rem 1.6rem;
    }

    .card-title {
      font-size: 1.02rem;
      font-weight: 800;
      margin-bottom: 1.3rem;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 0.55rem;
      letter-spacing: -0.01em;
    }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex: none; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.72rem 0.85rem;
      border: 1.5px solid var(--line);
      border-radius: 11px;
      font-size: 0.92rem;
      font-family: inherit;
      color: var(--ink);
      margin-bottom: 1.05rem;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input::placeholder { color: #b3adbf; }
    input:focus { outline: none; border-color: var(--brand-2); box-shadow: 0 0 0 4px rgba(155,45,143,0.12); }

    .btn {
      padding: 0.72rem 1.3rem;
      border: none;
      border-radius: 11px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s, background 0.15s, border-color 0.15s;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--brand-2), var(--brand));
      color: #fff;
      box-shadow: 0 10px 22px -10px rgba(109,31,110,0.7);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.06); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.78rem; border-radius: 9px; }
    .btn-outline { background: #fff; border: 1.5px solid var(--line); color: var(--brand); }
    .btn-outline:hover:not(:disabled) { border-color: var(--brand-2); background: #faf6fb; }
    .btn-danger { background: #fff; border: 1.5px solid #f2c9c4; color: var(--err); }
    .btn-danger:hover:not(:disabled) { background: var(--err-bg); border-color: var(--err); }

    .alert {
      padding: 0.8rem 0.95rem;
      border-radius: 11px;
      font-size: 0.86rem;
      font-weight: 500;
      margin-bottom: 1.05rem;
    }
    .alert-success { background: var(--ok-bg); color: var(--ok); }
    .alert-error   { background: var(--err-bg); color: var(--err); }

    /* QR result panel */
    #qr-result { display: none; margin-top: 1.25rem; }
    .qr-box {
      border: 1.5px dashed #d8cfe0;
      border-radius: 14px;
      padding: 1.35rem;
      text-align: center;
      background: linear-gradient(180deg, #fbfafd, #fff);
    }
    #qr-canvas { margin: 0 auto 0.75rem; display: inline-block; padding: 0.6rem; background: #fff; border-radius: 10px; }
    .link-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem; }
    .link-box {
      flex: 1; padding: 0.55rem 0.75rem; border: 1.5px solid var(--line); border-radius: 9px;
      font-size: 0.78rem; color: var(--muted); background: #faf9fc; word-break: break-all; text-align: left;
    }

    /* Program list */
    .program-item {
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
    }
    .program-item:last-child { border-bottom: none; padding-bottom: 0; }
    .program-item:first-child { padding-top: 0; }

    .prog-row1 {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 0.6rem; margin-bottom: 0.55rem;
    }
    .prog-name { font-weight: 700; font-size: 0.95rem; letter-spacing: -0.01em; }
    .prog-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 99px;
      font-size: 0.7rem; font-weight: 700; white-space: nowrap;
    }
    .badge-open   { background: var(--ok-bg); color: var(--ok); }
    .badge-closed { background: #efeaf2; color: var(--muted); }

    .prog-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.6rem; }
    .count-chip {
      font-size: 0.78rem; color: var(--brand); font-weight: 800; align-self: center;
      background: #faf6fb; padding: 3px 10px; border-radius: 99px;
    }

    .empty { color: #a89fb3; font-size: 0.88rem; text-align: center; padding: 2.5rem 0; }
    .spinner {
      width: 30px; height: 30px; margin: 2rem auto;
      border: 3px solid var(--line); border-top-color: var(--brand-2);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #auth-wall {
      position: fixed; inset: 0; z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 1.25rem;
      background: rgba(28,10,34,0.55); backdrop-filter: blur(6px);
    }
    .auth-box {
      background: #fff; border-radius: 20px; padding: 2.2rem 2rem; text-align: center;
      box-shadow: 0 30px 70px -25px rgba(30,5,40,0.6); max-width: 340px; width: 100%;
    }
    .auth-mark {
      width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 1.1rem;
      background: linear-gradient(135deg, var(--brand-deep), var(--brand-2));
      display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 1.1rem;
    }
    .auth-box h2 { font-size: 1.15rem; font-weight: 800; margin-bottom: 0.45rem; }
    .auth-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.35rem; line-height: 1.55; }
    #gsi-btn { display: flex; justify-content: center; }
  </style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">
    <span class="brand-badge">UiTM</span>
    <div>
      <h1>Admin Panel</h1>
      <div class="brand-sub">Pengurusan Program · Hal Ehwal Pelajar</div>
    </div>
  </div>
  <a class="nav-link" href="dashboard.html">Dashboard KPI →</a>
</header>

<div class="grid">

  <!-- ── Create Program ── -->
  <div class="card">
    <div class="card-title"><span class="dot"></span>Cipta Program Baru</div>

    <div id="create-alert" style="display:none"></div>

    <label for="c-name">Nama Program</label>
    <input type="text" id="c-name" placeholder="cth: Karnival Sukan 2025" maxlength="100">

    <label for="c-date">Tarikh Program</label>
    <input type="date" id="c-date">

    <label for="c-organizer">Anjuran / Unit</label>
    <input type="text" id="c-organizer" placeholder="cth: Biro Sukan HEP" maxlength="100">

    <button class="btn btn-primary" id="btn-create" onclick="createProgram()">Cipta Program</button>

    <!-- QR + link result -->
    <div id="qr-result">
      <div class="qr-box">
        <div id="qr-canvas"></div>
        <p style="font-size:0.82rem; color:#555; margin-bottom:0.5rem">Imbas QR semasa program fizikal</p>
        <div class="link-row">
          <div class="link-box" id="qr-link-text"></div>
          <button class="btn btn-outline btn-sm" onclick="copyLink()">Salin</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Program List ── -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between">
      <span style="display:flex; align-items:center; gap:0.55rem"><span class="dot"></span>Senarai Program</span>
      <button class="btn btn-outline btn-sm" onclick="loadPrograms()">Muat Semula</button>
    </div>
    <div id="programs-list">
      <div class="spinner"></div>
    </div>
  </div>

</div>
</div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbxfVUFnpLxR51o_Xfg0DTiyvrHi5AmDMwwWSeEbAh0ztZgsuarguQ5-bwz5Oki1027vAw/exec';
  const BASE_URL = window.location.origin + window.location.pathname.replace('admin.html', '');

  let lastQrLink = '';

  async function apiCall(params) {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ ...params, idToken: getAuthToken() }),
      redirect: 'follow',
    });
    return res.json();
  }

  function showCreateAlert(type, msg) {
    const el = document.getElementById('create-alert');
    el.className = 'alert alert-' + type;
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ── Create program ────────────────────────────────────────────────────────

  async function createProgram() {
    const name      = document.getElementById('c-name').value.trim();
    const date      = document.getElementById('c-date').value;
    const organizer = document.getElementById('c-organizer').value.trim();

    if (!name || !date || !organizer) {
      showCreateAlert('error', 'Sila isi semua medan.');
      return;
    }

    const btn = document.getElementById('btn-create');
    btn.disabled = true;
    btn.textContent = 'Mencipta...';
    document.getElementById('qr-result').style.display = 'none';
    document.getElementById('create-alert').style.display = 'none';

    try {
      const res = await apiCall({ action: 'createProgram', name, date, organizer });

      if (!res.ok) {
        showCreateAlert('error', res.error);
        return;
      }

      const { pid } = res.data;
      const registerUrl = BASE_URL + 'register.html?pid=' + pid;

      showCreateAlert('success', 'Program berjaya dicipta! PID: ' + pid);
      renderQR(registerUrl);
      loadPrograms();

      // Reset form
      document.getElementById('c-name').value = '';
      document.getElementById('c-date').value = '';
      document.getElementById('c-organizer').value = '';

    } catch (err) {
      showCreateAlert('error', 'Ralat sambungan. Sila cuba semula.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Cipta Program';
    }
  }

  function renderQR(url) {
    lastQrLink = url;
    const container = document.getElementById('qr-canvas');
    container.innerHTML = '';

    new QRCode(container, {
      text: url,
      width: 180,
      height: 180,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });

    // textContent prevents XSS
    document.getElementById('qr-link-text').textContent = url;
    document.getElementById('qr-result').style.display = 'block';
  }

  function copyLink() {
    if (!lastQrLink) return;
    navigator.clipboard.writeText(lastQrLink).then(() => {
      const btn = event.target;
      btn.textContent = 'Disalin!';
      setTimeout(() => { btn.textContent = 'Salin'; }, 2000);
    });
  }

  // ── Program list ──────────────────────────────────────────────────────────

  async function loadPrograms() {
    const list = document.getElementById('programs-list');
    list.innerHTML = '<div class="spinner"></div>';

    try {
      const res = await apiCall({ action: 'getKPI' });

      if (!res.ok) {
        list.innerHTML = '<div class="alert alert-error">' + sanitizeText(res.error) + '</div>';
        return;
      }

      const programs = res.data.programs;

      if (!programs || programs.length === 0) {
        list.innerHTML = '<div class="empty">Tiada program lagi.</div>';
        return;
      }

      // Sort: open first, then by date desc
      programs.sort((a, b) => {
        if (a.status === b.status) return new Date(b.date) - new Date(a.date);
        return a.status === 'open' ? -1 : 1;
      });

      list.innerHTML = '';
      programs.forEach(prog => {
        const item = document.createElement('div');
        item.className = 'program-item';

        const row1 = document.createElement('div');
        row1.className = 'prog-row1';

        const info = document.createElement('div');
        const nameEl = document.createElement('div');
        nameEl.className = 'prog-name';
        nameEl.textContent = prog.name;          // textContent — XSS safe

        const meta = document.createElement('div');
        meta.className = 'prog-meta';
        meta.textContent = prog.date + ' · ' + prog.organizer;

        info.appendChild(nameEl);
        info.appendChild(meta);

        const right = document.createElement('div');
        right.style.display = 'flex';
        right.style.alignItems = 'center';
        right.style.gap = '0.5rem';

        const badge = document.createElement('span');
        badge.className = 'badge badge-' + prog.status;
        badge.textContent = prog.status === 'open' ? 'Buka' : 'Tutup';

        const count = document.createElement('span');
        count.className = 'count-chip';
        count.textContent = prog.participantCount + ' pelajar';

        right.appendChild(badge);
        right.appendChild(count);
        row1.appendChild(info);
        row1.appendChild(right);

        const actions = document.createElement('div');
        actions.className = 'prog-actions';

        // Copy link button
        const copyBtn = document.createElement('button');
        copyBtn.className = 'btn btn-outline btn-sm';
        copyBtn.textContent = 'Salin Link';
        const regUrl = BASE_URL + 'register.html?pid=' + prog.pid;
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(regUrl).then(() => {
            copyBtn.textContent = 'Disalin!';
            setTimeout(() => { copyBtn.textContent = 'Salin Link'; }, 2000);
          });
        };

        // Show QR button
        const qrBtn = document.createElement('button');
        qrBtn.className = 'btn btn-outline btn-sm';
        qrBtn.textContent = 'Tunjuk QR';
        qrBtn.onclick = () => {
          renderQR(regUrl);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        actions.appendChild(copyBtn);
        actions.appendChild(qrBtn);

        // Close button — only for open programs
        if (prog.status === 'open') {
          const closeBtn = document.createElement('button');
          closeBtn.className = 'btn btn-danger btn-sm';
          closeBtn.textContent = 'Tutup Program';
          closeBtn.onclick = () => confirmClose(prog.pid, prog.name, closeBtn);
          actions.appendChild(closeBtn);
        }

        item.appendChild(row1);
        item.appendChild(actions);
        list.appendChild(item);
      });

    } catch (err) {
      list.innerHTML = '<div class="alert alert-error">Ralat sambungan. Sila cuba semula.</div>';
    }
  }

  async function confirmClose(pid, name, btn) {
    if (!confirm('Tutup program "' + name + '"? Pelajar tidak akan dapat mendaftar selepas ini.')) return;

    btn.disabled = true;
    btn.textContent = 'Menutup...';

    try {
      const res = await apiCall({ action: 'closeProgram', pid });
      if (res.ok) {
        loadPrograms();
      } else {
        alert('Ralat: ' + res.error);
        btn.disabled = false;
        btn.textContent = 'Tutup Program';
      }
    } catch (err) {
      alert('Ralat sambungan. Sila cuba semula.');
      btn.disabled = false;
      btn.textContent = 'Tutup Program';
    }
  }

  function sanitizeText(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // Init
  requireAuth(loadPrograms);
</script>

<div id="auth-wall">
  <div class="auth-box">
    <div class="auth-mark">UiTM</div>
    <h2>Log Masuk Diperlukan</h2>
    <p>Gunakan akaun Google UiTM anda untuk meneruskan ke Admin Panel.</p>
    <div id="gsi-btn"></div>
  </div>
</div>
</body>
</html>
